# Secrets from self-hosted Infisical (infisical-secret-store-calendar-sync,
# folder /calendar-sync). Infisical secrets are flat key/value → remoteRef.key is
# the bare name, no property.
#
# The three file secrets keep the exact keys the CronJob mounts by subPath
# (config.yaml, google_client_secret.json, google_client_secret2.json).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calendar-sync-config
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-secret-store-calendar-sync
    kind: ClusterSecretStore
  target:
    name: calendar-sync-config
    creationPolicy: Owner
  data:
    - secretKey: config.yaml
      remoteRef:
        key: CALENDAR_SYNC_CONFIG
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calendar-sync-secrets
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-secret-store-calendar-sync
    kind: ClusterSecretStore
  target:
    name: calendar-sync-secrets
    creationPolicy: Owner
  data:
    - secretKey: google_client_secret.json
      remoteRef:
        key: GOOGLE_CLIENT_SECRET
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calendar-sync-secrets2
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-secret-store-calendar-sync
    kind: ClusterSecretStore
  target:
    name: calendar-sync-secrets2
    creationPolicy: Owner
  data:
    - secretKey: google_client_secret2.json
      remoteRef:
        key: GOOGLE_CLIENT_SECRET2
---
# UPTRACE_DSN (telemetry ingest, contains a token) → CronJob env via secretKeyRef.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: calendar-sync-env
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: infisical-secret-store-calendar-sync
    kind: ClusterSecretStore
  target:
    name: calendar-sync-env
    creationPolicy: Owner
  data:
    - secretKey: UPTRACE_DSN
      remoteRef:
        key: UPTRACE_DSN
