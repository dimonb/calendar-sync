# Build + GitOps promote (GEH/wit-style). On push to main:
#   1. test → build+push the image to GHCR, tagged with the immutable commit SHA
#      (plus :hash and :latest for convenience).
#   2. promote → pin deploy/kustomization.yaml's `newTag` to that SHA and
#      force-update the generated `deploy/main` branch. main history stays free of
#      image-bump churn (the placeholder there stays `latest`).
# ArgoCD (k8s-dibot gitops/apps/calendar-sync.yaml) reconciles `deploy/main`, so
# the running version is pinned and git-tracked — rollback = revert the bump
# commit. Secrets stay on Infisical /calendar-sync via ExternalSecrets.
name: Build & promote Calendar Sync

on:
  push:
    paths:
      - '**'
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        run: poetry run pytest -q --disable-warnings --maxfail=1
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v5
      with:
        submodules: recursive

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Compute hash
      id: vars
      run: echo "hash=$(echo ${{ hashFiles('calendar_sync/**', 'Dockerfile', 'pyproject.toml', 'poetry.lock') }})" >> $GITHUB_OUTPUT

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ steps.vars.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/calendar-sync:${{ github.sha }} 
          ghcr.io/${{ github.repository }}/calendar-sync:${{ steps.vars.outputs.hash }}
          ghcr.io/${{ github.repository }}/calendar-sync:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache

  # Materialize the generated deploy/main branch (pins the image tag to this
  # commit SHA) that ArgoCD tracks. Only on push to main; main history stays free
  # of image-bump commits — the placeholder there stays `newTag: latest`.
  promote:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEPLOY_BRANCH: deploy/main
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Materialize deploy/main with pinned image tag
        run: |
          set -euo pipefail
          git fetch origin "${DEPLOY_BRANCH}:refs/remotes/origin/${DEPLOY_BRANCH}" || true
          git switch --detach "${GITHUB_SHA}"
          # Rewrite the single `newTag:` placeholder in the deploy overlay to the
          # promoted commit SHA (matches the built ghcr tag above).
          sed -i "s|^    newTag: .*|    newTag: ${GITHUB_SHA}|" deploy/kustomization.yaml
          git config user.name "calendar-sync-image-bot"
          git config user.email "calendar-sync-image-bot@users.noreply.github.com"
          git add deploy/kustomization.yaml
          git commit --allow-empty -m "chore(deploy): promote calendar-sync ${GITHUB_SHA::7}"
          remote_sha="$(git rev-parse --verify "refs/remotes/origin/${DEPLOY_BRANCH}" 2>/dev/null || true)"
          if [ -n "$remote_sha" ]; then
            git push --force-with-lease="refs/heads/${DEPLOY_BRANCH}:${remote_sha}" origin HEAD:"refs/heads/${DEPLOY_BRANCH}"
          else
            git push origin HEAD:"refs/heads/${DEPLOY_BRANCH}"
          fi