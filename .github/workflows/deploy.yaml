# Build-only: since 2026-07-13 the k8s deploy lives in the k8s-dibot git-lane
# (ArgoCD app calendar-sync → kustomize/calendar-sync; secrets on Infisical
# /calendar-sync). This workflow just builds+pushes the image; the CronJob there
# re-pulls :latest every run. No kubeconfig/helm deploy here anymore.
name: Build Calendar Sync image

on:
  push:
    paths:
      - '**'
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        run: poetry run pytest -q --disable-warnings --maxfail=1
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
        contents: read
        packages: write

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Log in to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Compute hash
      id: vars
      run: echo "hash=$(echo ${{ hashFiles('calendar_sync/**', 'Dockerfile', 'pyproject.toml', 'poetry.lock') }})" >> $GITHUB_OUTPUT

    - name: Cache Docker layers
      uses: actions/cache@v4
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ steps.vars.outputs.hash }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker-container

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}/calendar-sync:${{ github.sha }} 
          ghcr.io/${{ github.repository }}/calendar-sync:${{ steps.vars.outputs.hash }}
          ghcr.io/${{ github.repository }}/calendar-sync:latest
        cache-from: type=local,src=/tmp/.buildx-cache
        cache-to: type=local,dest=/tmp/.buildx-cache 